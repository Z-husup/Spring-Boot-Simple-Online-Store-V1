<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h4 mb-3 text-center">Simple Store Login</h1>

                    <div class="alert alert-danger" th:if="${param.error}">
                        Invalid username or password.
                    </div>

                    <div class="alert alert-success" th:if="${param.logout}">
                        You have been logged out.
                    </div>

                    <div class="alert alert-success" th:if="${param.registered}">
                        Registration successful. Please sign in.
                    </div>

                    <form method="post" action="/login" class="d-grid gap-3">
                        <div>
                            <label class="form-label">Username</label>
                            <input name="username" class="form-control" required>
                        </div>

                        <div>
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    </form>

                    <hr>
                    <p class="mb-0 text-center">No account yet? <a href="/register">Create one</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

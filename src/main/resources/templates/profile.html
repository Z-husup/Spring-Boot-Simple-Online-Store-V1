<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/profile.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg profile-nav border-bottom">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold text-white" href="/client/store">Online Store</a>
        <div class="d-flex align-items-center gap-2">
            <span id="profileUserBadge" class="badge user-pill">Loading...</span>
            <a class="btn btn-outline-light btn-sm" href="/client/store">Store</a>
            <a class="btn btn-outline-warning btn-sm" href="/client/cart">Cart</a>
            <a class="btn btn-outline-info btn-sm" href="/client/orders">Orders</a>
            <a class="btn btn-outline-danger btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<header class="profile-header py-3 px-4 border-bottom">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h1 class="h5 mb-0">My Profile</h1>
        <div id="profileStatus" class="small status-pill">Loading profile...</div>
    </div>
</header>

<main class="container-fluid px-4 py-4">
    <div class="row g-4">
        <div class="col-12 col-lg-7 col-xl-6">
            <div class="card profile-card border-0">
                <div class="card-header bg-white border-0 pt-3">
                    <h2 class="h6 mb-0">Account Information</h2>
                </div>
                <div class="card-body">
                    <form id="profileForm" class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Email</label>
                            <input id="emailInput" class="form-control" readonly>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Display Name</label>
                            <input id="nameInput" class="form-control" required>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-warning fw-semibold">Save Changes</button>
                            <button type="button" id="reloadProfileBtn" class="btn btn-outline-dark">Reload</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-5 col-xl-4">
            <aside class="card info-card border-0">
                <div class="card-body">
                    <h2 class="h6 mb-3">Profile Tips</h2>
                    <ul class="small text-secondary mb-0 ps-3">
                        <li>Your email is used as login username.</li>
                        <li>You can update display name anytime.</li>
                        <li>Changes apply immediately to store UI.</li>
                    </ul>
                </div>
            </aside>
        </div>
    </div>
</main>

<script src="/js/profile.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/store.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg store-nav border-bottom">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold text-white" href="/client/store">Online Store</a>
        <form class="d-flex nav-search" role="search" onsubmit="return false;">
            <input id="searchInput" class="form-control" type="search" placeholder="Search products...">
        </form>
        <div class="d-flex align-items-center gap-2">
            <span id="meBadge" class="badge user-pill">Loading...</span>
            <a href="/client/cart" class="btn btn-warning btn-sm fw-semibold">Cart</a>
            <a href="/client/orders" class="btn btn-outline-light btn-sm">Orders</a>
            <a href="/client/profile" class="btn btn-outline-info btn-sm">Profile</a>
        </div>
    </div>
</nav>

<section class="hero-strip py-3 px-4">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div>
            <h1 class="h5 mb-1">Today’s picks for your setup</h1>
            <p class="mb-0 text-secondary">Fast delivery style, clean product grid, instant add-to-cart.</p>
        </div>
        <button id="refreshProducts" class="btn btn-outline-dark btn-sm">Refresh</button>
    </div>
</section>

<main class="container-fluid px-4 py-4">
    <div id="storeStatus" class="alert alert-light border">Loading products...</div>
    <div id="productGrid" class="row g-3"></div>
</main>

<script src="/js/store.js"></script>
</body>
</html>

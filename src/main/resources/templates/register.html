<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h4 mb-3 text-center">Create Account</h1>

                    <div class="alert alert-danger" th:if="${param.error == 'password_mismatch'}">
                        Passwords do not match.
                    </div>

                    <div class="alert alert-danger" th:if="${param.error == 'email_exists'}">
                        This email is already registered.
                    </div>

                    <form method="post" action="/register" class="d-grid gap-3">
                        <div>
                            <label class="form-label">Email (used as login)</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div>
                            <label class="form-label">Display Name</label>
                            <input name="name" class="form-control" required>
                        </div>

                        <div>
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <div>
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirmPassword" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>

                    <hr>
                    <p class="mb-0 text-center">Already have an account? <a href="/login">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

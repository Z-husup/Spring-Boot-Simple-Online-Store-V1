<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/orders.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg orders-nav border-bottom">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold text-white" href="/client/store">Online Store</a>
        <div class="d-flex align-items-center gap-2">
            <span id="ordersUserBadge" class="badge user-pill">Loading...</span>
            <a class="btn btn-outline-light btn-sm" href="/client/store">Store</a>
            <a class="btn btn-outline-warning btn-sm" href="/client/cart">Cart</a>
            <a class="btn btn-outline-info btn-sm" href="/client/profile">Profile</a>
            <a class="btn btn-outline-danger btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<header class="orders-header py-3 px-4 border-bottom">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h1 class="h5 mb-0">My Orders</h1>
        <div id="ordersStatus" class="small status-pill">Loading orders...</div>
    </div>
</header>

<main class="container-fluid px-4 py-4">
    <div class="row g-4">
        <div class="col-12 col-xl-8">
            <div class="card orders-panel border-0">
                <div class="card-header bg-white border-0 pt-3 d-flex justify-content-between align-items-center">
                    <h2 class="h6 mb-0">Order History</h2>
                    <button id="refreshOrdersBtn" class="btn btn-outline-dark btn-sm">Refresh</button>
                </div>
                <div class="card-body pt-2">
                    <div id="ordersList" class="d-grid gap-3"></div>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-4">
            <aside class="card summary-panel border-0 sticky-xl-top" style="top: 1rem;">
                <div class="card-body">
                    <h2 class="h6 mb-3">Summary</h2>
                    <div class="d-flex justify-content-between mb-2 text-secondary">
                        <span>Total orders</span>
                        <strong id="ordersCount">0</strong>
                    </div>
                    <div class="d-flex justify-content-between mb-3 text-secondary">
                        <span>Total spent</span>
                        <strong id="ordersSpent">$0.00</strong>
                    </div>
                    <hr>
                    <p class="small text-secondary mb-0">Track all your completed purchases in one place.</p>
                </div>
            </aside>
        </div>
    </div>
</main>

<script src="/js/orders.js"></script>
</body>
</html>

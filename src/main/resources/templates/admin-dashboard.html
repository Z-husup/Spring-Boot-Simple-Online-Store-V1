<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Simple Store Admin</a>
        <a class="btn btn-outline-light btn-sm" href="/login">Switch User</a>
    </div>
</nav>

<main class="container py-4">
    <div class="row g-3">
        <div class="col-12 col-lg-6">
            <div class="card">
                <div class="card-header">Create Product</div>
                <div class="card-body">
                    <form id="createProductForm" class="row g-2">
                        <div class="col-12"><input name="name" class="form-control" placeholder="Name" required></div>
                        <div class="col-12"><input name="description" class="form-control" placeholder="Description"></div>
                        <div class="col-12"><input name="imageUrl" class="form-control" placeholder="Image URL (https://...)" required></div>
                        <div class="col-6"><input name="price" type="number" step="0.01" class="form-control" placeholder="Price" required></div>
                        <div class="col-6"><input name="stock" type="number" class="form-control" placeholder="Stock" required></div>
                        <div class="col-12"><button class="btn btn-primary">Create</button></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-6">
            <div class="card">
                <div class="card-header">Stock / Price Update</div>
                <div class="card-body">
                    <form id="restockForm" class="row g-2 mb-3">
                        <div class="col-6"><input name="productId" type="number" class="form-control" placeholder="Product ID" required></div>
                        <div class="col-6"><input name="quantity" type="number" class="form-control" placeholder="Add Stock" required></div>
                        <div class="col-12"><button class="btn btn-outline-success">Restock</button></div>
                    </form>

                    <form id="changePriceForm" class="row g-2">
                        <div class="col-6"><input name="productId" type="number" class="form-control" placeholder="Product ID" required></div>
                        <div class="col-6"><input name="price" type="number" step="0.01" class="form-control" placeholder="New Price" required></div>
                        <div class="col-12"><button class="btn btn-outline-warning">Change Price</button></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div id="adminStatus" class="alert alert-secondary mb-0">Ready.</div>
        </div>
    </div>
</main>

<script src="/js/admin.js"></script>
</body>
</html>
